name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, scaffold/* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt', 'tests/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        cd ../tests
        pip install -r requirements.txt
    
    - name: Run safety validator tests
      run: |
        pytest tests/test_safety.py -v
    
    - name: Run API smoke tests
      run: |
        pytest tests/test_api_smoke.py -v
    
    - name: Run all tests with coverage
      run: |
        pytest tests/ --cov=backend/app --cov-report=xml --cov-report=term
    
    - name: Upload coverage to Codecov (optional)
      uses: codecov/codecov-action@v3
      if: success()
      with:
        files: ./coverage.xml
        flags: backend
        name: backend-coverage

  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        pip install flake8 black isort
    
    - name: Run flake8
      run: |
        flake8 backend/app --max-line-length=120 --ignore=E203,W503
      continue-on-error: true
    
    - name: Check code formatting with black
      run: |
        black --check backend/app
      continue-on-error: true
    
    - name: Check import sorting
      run: |
        isort --check-only backend/app
      continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install security tools
      run: |
        pip install bandit safety
    
    - name: Run bandit security linter
      run: |
        bandit -r backend/app -ll
      continue-on-error: true
    
    - name: Check for known vulnerabilities
      run: |
        cd backend
        safety check --json
      continue-on-error: true

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build backend image
      run: |
        docker build -f backend/Dockerfile -t ada-backend:latest backend/
    
    - name: Build sandbox image
      run: |
        docker build -f sandbox/Dockerfile.sandbox -t ada-sandbox:latest sandbox/
    
    - name: Build frontend image
      run: |
        docker build -f frontend/Dockerfile -t ada-frontend:latest frontend/
    
    - name: Test Docker Compose
      run: |
        docker compose config

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, build-docker]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Build sandbox image
      run: |
        docker build -f sandbox/Dockerfile.sandbox -t ada-sandbox:latest sandbox/
    
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        cd ../tests
        pip install -r requirements.txt
    
    - name: Run integration tests
      run: |
        # Start backend in background
        cd backend
        uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        sleep 5
        
        # Run API tests
        cd ../tests
        pytest test_api_smoke.py -v
      env:
        SANDBOX_IMAGE: ada-sandbox:latest
        USE_DOCKER_SANDBOX: "true"
